<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/comunidades.css">
    <title>Gerenciador</title>
</head>
<body>
    <aside>
        <div class="logo">
            <img src="../assets/church-svgrepo-com.svg" alt="">
            <h2>Paróquia <br> Minas Gerais</h2>
        </div>
        <nav>
            <a href="#" class="dashboard"><img src="../assets/home.svg" alt="">Dashboard</a>
            <a href="pessoas.html" class="pessoas"><img src="../assets/person.svg" alt="">Pessoas</a>
            <a href="grupos.html" class="grupos"><img src="../assets/grupo.svg" alt="">Grupos</a>
            <a href="#" class="comunidades"><img src="../assets/comunidade.svg" alt="">Comunidades</a>
        </nav>
    </aside>

    <div class="main-content">
        <header>
            <div class="titulo">
                <h1>Comunidades</h1>
                <p>Gerencie as comunidades da sua paróquia</p>
            </div>
            <div class="juntos">
                <div class="input-btn">
                    <input type="text" placeholder="Buscar comunidade..." id="input-busca-comunidades">
                    <button id="claen-busca-comunidades"><img src="../assets/search-svgrepo-com.svg" alt=""></button>
                </div>
                <div class="post-btn">
                    <button>
                        <img src="../assets/plus.svg" alt="">
                        Nova Comunidade
                    </button>
                </div>
                <div class="get-btn">
                    <button id="btn-mostrar-todos-comunidades">
                        <img src="../assets/google-sheets-svgrepo-com.svg" alt="">
                        Mostrar todos
                    </button>
                </div>
            </div>
        </header>
        <hr>

        <main>
            <div>
                <h3>Lista de Grupos</h3>
                <p id="encontrados">Encontrados: <span>0</span></p>
            </div>
            <hr>
            <table>
                <thead class="thead-titulo">
                    <tr class="celula-titulo">
                        <th>Id</th>
                        <th>Comunidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-comunidades">
                </tbody>
            </table>
        </main>
    </div>

    <div class="modal-fundo">
        .
    </div>

    <div class="modal-create">
        <div class="modal-content-comunidade">
            <h3>Adicionar nova comunidade</h3>
            <form action="" class="form-modal" id="form-comunidade">
                <div class="input-pessoa">
                    <label for="nome">Nome da comunidade:</label>
                    <input type="text" name="nome" placeholder="Digite o nome da comunidade..." onclick="clearError()">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/plus.svg" alt=""> Salvar</button>
                    <button class="btn-cancel" type="reset" onclick="clearError()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-update-comunidade">
        <div class="modal-content-comunidade">
            <h3>Atualizar Comunidade</h3>
            <form action="" class="form-modal" id="form-update-comunidade">
                <div class="input-pessoa">
                    <label for="nome">Nome da comunidade:</label>
                    <input type="text" name="nome" placeholder="Digite o nome da comunidade..." onclick="clearError()">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/plus.svg" alt=""> Salvar</button>
                    <button class="btn-cancel" type="reset" onclick="fecharModalUpdateComunidade()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-delete-comunidade">
        <div class="modal-content-comunidade-delete">
            <h3>Deletar Comunidade</h3>
            <form action="" class="form-modal" id="form-delete-comunidade">
                <p>Apagar permanentemente: <strong id="nome-delete-comunidade"></strong> ?</p>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/delete-white.svg" alt=""> Deletar</button>
                    <button class="btn-cancel" type="button" onclick="fecharModalDeleteComunidade()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="../code/modalCreate.js"></script>
<script src="../code/comunidade/comunidades.js"></script>
<script src="../code/comunidade/update.js"></script>
<script src="../code/comunidade/delete.js"></script>
<script src="../code/comunidade/post.js"></script>
<script src="../code/comunidade/busca.js"></script>
</html>
