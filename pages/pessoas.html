<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/pessoas.css">
    <title>Gerenciador</title>
</head>
<body>
    <aside>
        <div class="logo">
            <img src="../assets/church-svgrepo-com.svg" alt="">
            <h2>Paróquia <br> Minas Gerais</h2>
        </div>
        <nav>
            <a href="#" class="dashboard"><img src="../assets/home.svg" alt="">Dashboard</a>
            <a href="#" class="pessoas"><img src="../assets/person.svg" alt="">Pessoas</a>
            <a href="grupos.html" class="grupos"><img src="../assets/grupo.svg" alt="">Grupos</a>
            <a href="comunidades.html" class="comunidades"><img src="../assets/comunidade.svg" alt="">Comunidades</a>
        </nav>
        <!-- <div class="svg-igreja">
            <img src="../assets/igreja.svg" alt="">
        </div> -->
        
    </aside>

    <div class="main-content">
        <header>
            <div class="titulo">
                <h1>Pessoas</h1>
                <p>Gerencie os membros da sua paróquia</p>
            </div>
            <div class="juntos">
                <div class="input-btn">
                    <input type="text" placeholder="Buscar pessoa...">
                    <button><img src="../assets/search-svgrepo-com.svg" alt=""></button>
                </div>
                <div class="post-btn">
                    <button>
                        <img src="../assets/plus.svg" alt="">
                        Nova Pessoa
                    </button>
                </div>
            </div>
        </header>
        <hr>

        <div class="card-filtros">
            <h3>Consultas e Filtros</h3>
            <form action="" method="get">
                <div class="filtro-nome">
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" placeholder="Digite o nome...">
                </div>
                <div class="filtro-comunidade">
                    <label for="comunidade">Comunidade:</label>
                    <select name="comunidade">
                        <option value="">Selecione...</option>
                        <option value="comunidade2">Comunidade 2</option>
                        <option value="comunidade3">Comunidade 3</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="grupo">Grupo:</label>
                    <select name="grupo">
                        <option value="">Selecione...</option>
                        <option value="grupo2">Grupo 2</option>
                        <option value="grupo3">Grupo 3</option>
                    </select>
                </div>
                <div class="filtro-data">
                    <label for="data">Data:</label>
                    <input type="date" name="data">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/search-white.svg" alt="">Buscar</button>
                    <button class="btn-res" type="reset"><img src="../assets/reset-svgrepo-com.svg" alt="">Limpar Filtros</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
