<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/grupos.css">
    <title>Gerenciador</title>
</head>
<body>
    <aside>
        <div class="logo">
            <img src="../assets/church-svgrepo-com.svg" alt="">
            <h2>Paróquia <br> Minas Gerais</h2>
        </div>
        <nav>
            <a href="#" class="dashboard"><img src="../assets/home.svg" alt="">Dashboard</a>
            <a href="pessoas.html" class="pessoas"><img src="../assets/person.svg" alt="">Pessoas</a>
            <a href="#" class="grupos"><img src="../assets/grupo.svg" alt="">Grupos</a>
            <a href="comunidades.html" class="comunidades"><img src="../assets/comunidade.svg" alt="">Comunidades</a>
        </nav>
    </aside>

    <div class="main-content"> 
        <header>
            <div class="titulo">
                <h1>Grupos</h1>
                <p>Gerencie os grupos da sua paróquia</p>
            </div>
            <div class="juntos">
                <div class="input-btn">
                    <input type="text" placeholder="Buscar grupo...">
                    <button><img src="../assets/search-svgrepo-com.svg" alt=""></button>
                </div>
                <div class="post-btn">
                    <button>
                        <img src="../assets/plus.svg" alt="">
                        Novo Grupo
                    </button>
                </div>
                <div class="get-btn">
                    <button>
                        <img src="../assets/google-sheets-svgrepo-com.svg" alt="">
                        Mostrar todos
                    </button>
                </div>
            </div>
        </header>
        <hr>

        <main>
            <div>
                <h3>Lista de Grupos</h3>
                <p id="encontrados">Encontrados: <span>0</span></p>
            </div>
            <hr>
            <table>
                <thead class="thead-titulo">
                    <tr class="celula-titulo">
                        <th>Id</th>
                        <th>Grupo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-grupos">
                </tbody>
                    
            </table>
        </main>
    </div>

    <div class="modal-fundo">
        .
    </div>

    <div class="modal-create">
        <div class="modal-content-grupo">
            <h3>Adicionar novo grupo</h3>
            <form action="" class="form-modal" id="form-grupos">
                <div class="input-pessoa">
                    <label for="nome">Nome do grupo:</label>
                    <input type="text" name="nome" placeholder="Digite o nome do grupo..." onclick="clearError()">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/plus.svg" alt=""> Salvar</button>
                    <button class="btn-cancel" type="reset" onclick="clearError()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-update-grupo">
        <div class="modal-content-grupo">
            <h3>Atualizar Grupo</h3>
            <form action="" class="form-modal" id="form-update-grupo">
                <div class="input-pessoa">
                    <label for="nome">Nome do grupo:</label>
                    <input type="text" name="nome" placeholder="Digite o nome do grupo..." onclick="clearError()">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/plus.svg" alt=""> Salvar</button>
                    <button class="btn-cancel" type="reset" onclick="fecharModalUpdateGrupo()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-delete-grupo">
        <div class="modal-content-grupo-delete">
            <h3>Deletar Grupo</h3>
            <form action="" class="form-modal" id="form-delete-grupo">
                <p>Apagar permanentemente: <strong id="nome-delete-grupo"></strong> ?</p>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/delete-white.svg" alt=""> Deletar</button>
                    <button class="btn-cancel" type="button" onclick="fecharModalDeleteGrupo()">X Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="../code/modalCreate.js"></script>
<!-- <script src="../code/modalUpdate.js"></script> -->
<script src="../code/grupos/grupos.js"></script>
<script src="../code/grupos/update.js"></script>
<script src="../code/grupos/delete.js"></script>
<script src="../code/grupos/post.js"></script>
<script>renderizarGrupo()</script>
</html>
