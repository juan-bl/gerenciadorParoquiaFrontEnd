<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/grupos.css">
    <title>Gerenciador</title>
</head>
<body>
    <aside>
        <div class="logo">
            <img src="../assets/church-svgrepo-com.svg" alt="">
            <h2>Paróquia <br> Minas Gerais</h2>
        </div>
        <nav>
            <a href="#" class="dashboard"><img src="../assets/home.svg" alt="">Dashboard</a>
            <a href="pessoas.html" class="pessoas"><img src="../assets/person.svg" alt="">Pessoas</a>
            <a href="#" class="grupos"><img src="../assets/grupo.svg" alt="">Grupos</a>
            <a href="comunidades.html" class="comunidades"><img src="../assets/comunidade.svg" alt="">Comunidades</a>
        </nav>
    </aside>

    <div class="main-content"> 
        <header>
            <div class="titulo">
                <h1>Grupos</h1>
                <p>Gerencie os grupos da sua paróquia</p>
            </div>
            <div class="juntos">
                <div class="input-btn">
                    <input type="text" placeholder="Buscar grupo...">
                    <button><img src="../assets/search-svgrepo-com.svg" alt=""></button>
                </div>
                <div class="post-btn">
                    <button>
                        <img src="../assets/plus.svg" alt="">
                        Novo Grupo
                    </button>
                </div>
            </div>
        </header>
        <hr>

        <div class="card-filtros">
            <h3>Consultas e Filtros</h3>
            <form action="" method="get">
                <div class="filtro-nome">
                    <label for="nome">Nome do grupo:</label>
                    <input type="text" name="nome" placeholder="Digite o nome do grupo...">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit"><img src="../assets/search-white.svg" alt="">Buscar</button>
                    <button class="btn-res" type="reset"><img src="../assets/reset-svgrepo-com.svg" alt="">Limpar Filtros</button>
                </div>
            </form>
        </div>

        <main>
            <h3>Lista de Grupos</h3>
            <br>
            <table>
                <thead class="thead-titulo">
                    <tr class="celula-titulo">
                        <th>Id</th>
                        <th>Grupo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="celula-dados">
                        <td>1</td>
                        <td>Grupo de Jovens</td>
                        <td>
                            <button class="edit-btn"><img src="../assets/edit-svgrepo-com.svg" alt="">Editar</button>
                            <button class="delete-btn"><img src="../assets/delete-svgrepo-com.svg" alt="">Excluir</button>
                        </td>
                    </tr>
                    <tr class="celula-dados">
                        <td>2</td>
                        <td>Grupo de Casais</td>
                        <td>
                            <button class="edit-btn"><img src="../assets/edit-svgrepo-com.svg" alt="">Editar</button>
                            <button class="delete-btn"><img src="../assets/delete-svgrepo-com.svg" alt="">Excluir</button>
                        </td>
                        
                    </tr>
                    <tr class="celula-dados">
                        <td>3</td>
                        <td>Grupo de Idosos</td>
                        <td>
                            <button class="edit-btn"><img src="../assets/edit-svgrepo-com.svg" alt="">Editar</button>
                            <button class="delete-btn"><img src="../assets/delete-svgrepo-com.svg" alt="">Excluir</button>
                        </td>
                </tbody>
            </table>
        </main>
    </div>

    <div class="modal-grupo-create modal-create">
        <div class="modal-content-grupo">
            <h3>Adicionar novo grupo</h3>
            <form action="" class="form-modal">
                <div class="input-pessoa">
                    <label for="nome">Nome do grupo:</label>
                    <input type="text" name="nome" placeholder="Digite o nome do grupo...">
                </div>
                <div class="btn-form">
                    <button class="btn-sub" type="submit">Salvar</button>
                    <button class="btn-cancel" type="button">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="../code/eventos.js"></script>
</html>
